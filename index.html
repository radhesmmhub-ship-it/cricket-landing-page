<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shaan Malik Dubai</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#0a1f44,#030b1a);
font-family:Poppins;
color:white;
overflow:hidden;
}

/* animated background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffb30022 2px,transparent 2px);
background-size:60px 60px;
animation:move 30s linear infinite;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

/* card */

.card{
background:#081630;
padding:50px 40px;
border-radius:28px;
width:90%;
max-width:430px;
text-align:center;
box-shadow:0 0 60px rgba(0,0,0,0.8);
position:relative;
z-index:2;
}

/* badge */

.badge{
background:linear-gradient(45deg,#ffb300,#ffd700);
color:black;
padding:12px 28px;
border-radius:50px;
font-weight:700;
display:inline-block;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* title */

h1{
font-family:Orbitron;
font-size:36px;
letter-spacing:3px;
margin:6px 0;
text-shadow:0 0 10px rgba(255,255,255,0.4);
}

/* subtitle */

.subtitle{
color:#ffb300;
letter-spacing:3px;
margin-bottom:22px;
font-weight:600;
}

/* free section */

.free{
background:#0e2b55;
padding:14px;
border-radius:12px;
margin-bottom:25px;
font-size:15px;
line-height:1.6;
}

/* stats */

.info{
text-align:center;
line-height:2.2;
font-size:16px;
margin-bottom:28px;
font-weight:500;
}

.info span{
color:#ffd700;
font-weight:700;
}

/* 3D BUTTON */

.join{
display:block;
background:linear-gradient(#ffd700,#ffb300);
color:black;
text-decoration:none;
font-weight:800;
font-size:19px;
padding:18px;
border-radius:50px;
margin-top:10px;

box-shadow:
0 8px 0 #c99600,
0 10px 25px rgba(0,0,0,0.6);

transition:all 0.2s ease;
}

.join:hover{
transform:translateY(-3px);
box-shadow:
0 12px 0 #c99600,
0 15px 35px rgba(0,0,0,0.7);
}

.join:active{
transform:translateY(6px);
box-shadow:
0 3px 0 #c99600;
}

/* redirect text */

.redirect{
margin-top:16px;
opacity:0.85;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<div class="badge">🔥 LIVE CRICKET TIPS</div>

<h1>SHAAN MALIK</h1>
<h1>DUBAI</h1>

<div class="subtitle">PREMIUM CRICKET PREDICTIONS</div>

<div class="free">
🏏 Daily IPL Toss, Match & Session Tips<br>
🎯 100% Free of Cost for All Members
</div>

<div class="info">

🏆 Accuracy Rate: <span>92%</span><br>

⭐ Experience: <span>5+ Years</span><br>

👥 Members Joined: <span id="members">10237</span><br>

⚡ Trusted by Thousands

</div>

<a class="join" href="https://t.me/+zQOSiuRtS3wzNGU1">
🚀 JOIN TELEGRAM CHANNEL
</a>

<div class="redirect">
Redirecting to Telegram in <span id="count">12</span> seconds...
</div>

</div>

<script>

/* MEMBERS +2 PER SECOND */

let members = 10237;

setInterval(function(){

members += 2;

document.getElementById("members").innerText = members;

},1000);


/* REDIRECT TIMER */

let time = 12;

let timer = setInterval(function(){

time--;

document.getElementById("count").innerText = time;

if(time <= 0){

clearInterval(timer);

window.location.href="https://t.me/+zQOSiuRtS3wzNGU1";

}

},1000);

</script>

</body>
</html>
