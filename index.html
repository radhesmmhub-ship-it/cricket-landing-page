<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shaan Malik Dubai</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#0a1f44,#030b1a);
font-family:Poppins;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffb30022 2px,transparent 2px);
background-size:60px 60px;
animation:move 30s linear infinite;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

.card{
background:#081630;
padding:45px 35px;
border-radius:25px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.7);
position:relative;
z-index:2;
}

.badge{
background:#ffb300;
color:black;
padding:10px 25px;
border-radius:40px;
font-weight:700;
display:inline-block;
margin-bottom:20px;
}

h1{
font-family:Orbitron;
font-size:34px;
letter-spacing:2px;
margin:5px 0;
}

.subtitle{
color:#ffb300;
letter-spacing:2px;
margin-bottom:20px;
font-weight:600;
}

.free{
background:#0d2448;
padding:12px;
border-radius:10px;
margin-bottom:25px;
font-size:15px;
line-height:1.6;
}

.info{
text-align:center;
line-height:2.2;
font-size:16px;
margin-bottom:25px;
font-weight:500;
}

.info span{
color:#ffb300;
font-weight:700;
}

.join{
display:block;
background:linear-gradient(45deg,#ffb300,#ffd700);
color:black;
text-decoration:none;
font-weight:800;
font-size:18px;
padding:16px;
border-radius:50px;
margin-top:10px;
box-shadow:0 0 15px #ffb300;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #ffb300;}
to{box-shadow:0 0 25px #ffd700;}
}

.redirect{
margin-top:15px;
opacity:0.8;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<div class="badge">🔥 LIVE CRICKET TIPS</div>

<h1>SHAAN MALIK</h1>
<h1>DUBAI</h1>

<div class="subtitle">PREMIUM CRICKET PREDICTIONS</div>

<div class="free">
🏏 Daily IPL Toss, Match & Session Tips<br>
🎯 100% Free of Cost for All Members
</div>

<div class="info">

🏆 Accuracy Rate: <span>92%</span><br>

⭐ Experience: <span>5+ Years</span><br>

👥 Members Joined: <span id="members">10237</span><br>

⚡ Trusted by Thousands

</div>

<a class="join" href="https://t.me/+zQOSiuRtS3wzNGU1">
JOIN TELEGRAM CHANNEL
</a>

<div class="redirect">
Redirecting to Telegram in <span id="count">5</span> seconds...
</div>

</div>

<script>

/* MEMBERS +2 PER SECOND */

let members = 10237;

setInterval(function(){

members += 2;

document.getElementById("members").innerText = members;

},1000);


/* REDIRECT */

let time = 5;

let timer = setInterval(function(){

time--;

document.getElementById("count").innerText = time;

if(time <= 0){

clearInterval(timer);

window.location.href="https://t.me/+zQOSiuRtS3wzNGU1";

}

},1000);

</script>

</body>
</html>
